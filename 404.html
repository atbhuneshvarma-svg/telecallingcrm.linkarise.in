<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      // GitHub Pages redirect handler for SPA (React Router)
      (function() {
        var redirectTo = window.location.pathname.replace(
          '/telecallingcrm.linkarise.in',
          ''
        );
        // redirect to the index.html inside your repo with full path restored
        var newUrl = '/telecallingcrm.linkarise.in/index.html?redirect=' + redirectTo + window.location.search;
        window.location.replace(newUrl);
      })();
    </script>
  </head>
  <body>
    <h2>Redirecting to the app...</h2>
  </body>
</html>
