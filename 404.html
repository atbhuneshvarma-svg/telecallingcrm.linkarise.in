<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <script>
    (function() {
      // Get the current path and hash
      var pathname = window.location.pathname;
      var hash = window.location.hash;
      var search = window.location.search;
      
      // Your repo base path
      var repoBase = '/telecallingcrm.linkarise.in/';
      
      // If we're already at the base path but missing the hash, redirect to index
      if (pathname === repoBase && !hash) {
        window.location.href = repoBase + 'index.html#/';
        return;
      }
      
      // If we're at a 404 path, redirect to index.html with proper hash routing
      if (pathname !== repoBase && pathname !== repoBase + 'index.html') {
        var newPath = pathname.replace(repoBase, '');
        window.location.href = repoBase + 'index.html#' + newPath + search + hash;
      }
    })();
  </script>
</head>
<body>
  <h1>Redirecting...</h1>
  <p>Please wait while we redirect you to the application.</p>
</body>
</html>
